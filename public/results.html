<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - Lea Singers Voting</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f0f0;
      color: #1a1a2e;
      min-height: 100vh;
    }
    .header {
      background: #ED1C24;
      color: white;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .header img { height: 40px; margin-bottom: 0.3rem; }
    .header p { opacity: 0.9; font-size: 0.9rem; }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }
    .position-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #ED1C24;
      margin-bottom: 0.2rem;
    }
    .nominee-name {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
      margin-bottom: 0.8rem;
    }
    .voter-count {
      font-size: 0.8rem;
      color: #888;
      float: right;
    }
    .vote-bars {
      margin-bottom: 0.5rem;
    }
    .vote-bar-row {
      display: flex;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .vote-bar-label {
      width: 65px;
      font-size: 0.9rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .vote-bar-label.yes { color: #27ae60; }
    .vote-bar-label.no { color: #e74c3c; }
    .vote-bar-label.abstain { color: #999; }
    .vote-bar-bg {
      flex: 1;
      background: #f0f2f5;
      border-radius: 6px;
      height: 24px;
      overflow: hidden;
      margin: 0 10px;
    }
    .vote-bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease;
      display: flex;
      align-items: center;
      padding-left: 8px;
      font-size: 0.75rem;
      font-weight: 700;
      color: white;
      min-width: 0;
    }
    .vote-bar-fill.yes { background: #27ae60; }
    .vote-bar-fill.no { background: #e74c3c; }
    .vote-bar-fill.abstain { background: #bbb; }
    .vote-bar-count {
      font-weight: 700;
      font-size: 1rem;
      min-width: 30px;
      text-align: right;
    }
    .vote-bar-count.yes { color: #27ae60; }
    .vote-bar-count.no { color: #e74c3c; }
    .vote-bar-count.abstain { color: #999; }

    .chart-container {
      position: relative;
      width: 100%;
      height: 120px;
      margin-bottom: 0.5rem;
    }

    .result-badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-top: 0.5rem;
    }
    .result-badge.passed {
      background: #eafaf1;
      color: #27ae60;
      border: 1px solid #27ae60;
    }
    .result-badge.not-passed {
      background: #fdecea;
      color: #e74c3c;
      border: 1px solid #e74c3c;
    }
    .result-badge.no-votes {
      background: #f0f0f0;
      color: #888;
      border: 1px solid #ccc;
    }

    .refresh-btn {
      display: block;
      margin: 0 auto 1rem;
      padding: 0.5rem 1.5rem;
      background: #ED1C24;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #c9171e; }
    .nav-links {
      text-align: center;
      margin-top: 1.5rem;
      padding: 1rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .nav-links a {
      color: #ED1C24;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      margin: 0 0.8rem;
    }
    .nav-links a:hover { text-decoration: underline; }
    .empty-msg { text-align: center; color: #888; padding: 2rem; }
    .locked-msg {
      text-align: center;
      padding: 3rem 1rem;
    }
    .locked-msg h2 { color: #888; margin-bottom: 0.5rem; }
    .locked-msg p { color: #aaa; }
  </style>
</head>
<body>
  <div class="header">
    <img src="/logo.png" alt="Lea Singers" onerror="this.style.display='none'">
    <p>Committee Vote Results</p>
  </div>
  <div class="container">
    <div style="display:flex; justify-content:center; align-items:center; gap:1rem; margin-bottom:1rem;">
      <button class="refresh-btn" onclick="loadResults()" style="margin:0;">Refresh Now</button>
      <span style="font-size:0.8rem; color:#888;">Auto-refreshes every 10s</span>
    </div>
    <div id="content">
      <p class="empty-msg">Loading...</p>
    </div>
    <div class="nav-links">
      <a href="/">&larr; Back to Voting</a>
      <a href="/admin">Admin Panel</a>
    </div>
  </div>

  <script>
    let charts = {};

    async function loadResults() {
      try {
        const res = await fetch("/api/results");

        if (res.status === 403) {
          document.getElementById("content").innerHTML = `
            <div class="card locked-msg">
              <h2>Results Not Available Yet</h2>
              <p>The results will be published once voting is complete.</p>
            </div>`;
          return;
        }

        const data = await res.json();

        if (data.results.length === 0) {
          document.getElementById("content").innerHTML = '<p class="empty-msg">No positions set up yet</p>';
          return;
        }

        let html = "";

        for (const r of data.results) {
          if (!r.nominee_name) continue; // skip positions without nominees

          html += '<div class="card">';
          html += `<span class="voter-count">${r.totalVoters} vote${r.totalVoters !== 1 ? "s" : ""} cast</span>`;
          html += `<div class="position-title">${escapeHtml(r.position.name)}</div>`;
          html += `<div class="nominee-name">Nominee: ${escapeHtml(r.nominee_name)}</div>`;

          if (r.totalVoters === 0) {
            html += '<p class="empty-msg" style="padding:0.5rem;">No votes yet</p>';
            html += '<span class="result-badge no-votes">Awaiting votes</span>';
          } else {
            const total = r.yes + r.no + r.abstain;
            const yesPct = total > 0 ? (r.yes / total * 100) : 0;
            const noPct = total > 0 ? (r.no / total * 100) : 0;
            const abstainPct = total > 0 ? (r.abstain / total * 100) : 0;

            // Chart
            const chartId = `chart-${r.position.id}`;
            html += `<div class="chart-container">
              <canvas id="${chartId}"></canvas>
            </div>`;

            // Vote bars
            html += '<div class="vote-bars">';
            html += `<div class="vote-bar-row">
              <span class="vote-bar-label yes">Yes</span>
              <div class="vote-bar-bg"><div class="vote-bar-fill yes" style="width:${yesPct}%"></div></div>
              <span class="vote-bar-count yes">${r.yes}</span>
            </div>`;
            html += `<div class="vote-bar-row">
              <span class="vote-bar-label no">No</span>
              <div class="vote-bar-bg"><div class="vote-bar-fill no" style="width:${noPct}%"></div></div>
              <span class="vote-bar-count no">${r.no}</span>
            </div>`;
            html += `<div class="vote-bar-row">
              <span class="vote-bar-label abstain">Abstain</span>
              <div class="vote-bar-bg"><div class="vote-bar-fill abstain" style="width:${abstainPct}%"></div></div>
              <span class="vote-bar-count abstain">${r.abstain}</span>
            </div>`;
            html += '</div>';

            // Pass/fail badge
            const yesVotes = r.yes;
            const noVotes = r.no;
            if (yesVotes > noVotes) {
              html += '<span class="result-badge passed">Confidence vote passed</span>';
            } else if (noVotes > yesVotes) {
              html += '<span class="result-badge not-passed">Confidence vote not passed</span>';
            } else {
              html += '<span class="result-badge no-votes">Tied</span>';
            }
          }

          html += '</div>';
        }

        if (!html) {
          html = '<p class="empty-msg">No nominees have been assigned yet</p>';
        }

        document.getElementById("content").innerHTML = html;

        // Render pie charts
        for (const r of data.results) {
          if (!r.nominee_name || r.totalVoters === 0) continue;
          const chartId = `chart-${r.position.id}`;
          const ctx = document.getElementById(chartId);
          if (!ctx) continue;

          if (charts[chartId]) charts[chartId].destroy();

          charts[chartId] = new Chart(ctx.getContext("2d"), {
            type: "doughnut",
            data: {
              labels: ["Yes", "No", "Abstain"],
              datasets: [{
                data: [r.yes, r.no, r.abstain],
                backgroundColor: ["#27ae60", "#e74c3c", "#bbb"],
                borderWidth: 2,
                borderColor: "#fff",
              }],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: {
                  position: "right",
                  labels: {
                    usePointStyle: true,
                    pointStyle: "circle",
                    padding: 15,
                    font: { size: 13, weight: "600" },
                  },
                },
              },
            },
          });
        }
      } catch (err) {
        document.getElementById("content").innerHTML =
          '<p class="empty-msg">Could not load results. Please try again.</p>';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    loadResults();
    setInterval(loadResults, 10000);
  </script>
</body>
</html>
