<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results - Lea Singers Voting</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #2c3e7b, #4a69bd);
      color: white;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .header h1 { font-size: 1.4rem; margin-bottom: 0.2rem; }
    .header p { opacity: 0.85; font-size: 0.9rem; }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }

    .position-section {
      margin-bottom: 1.5rem;
    }
    .position-header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .position-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #2c3e7b;
    }
    .voter-count {
      font-size: 0.8rem;
      color: #888;
    }
    .winner-banner {
      background: linear-gradient(135deg, #27ae60, #2ecc71);
      color: white;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      margin-bottom: 0.8rem;
      font-weight: 600;
      text-align: center;
    }
    .winner-banner .label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; }
    .winner-banner .name { font-size: 1.1rem; }

    .result-row {
      display: flex;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .result-row:last-child { border-bottom: none; }
    .result-row .rank {
      width: 26px;
      height: 26px;
      background: #4a69bd;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .result-row .rank.gold { background: #f1c40f; color: #333; }
    .result-row .rank.silver { background: #95a5a6; }
    .result-row .rank.bronze { background: #cd6133; }
    .result-row .name { flex-shrink: 0; font-size: 0.95rem; min-width: 80px; }
    .bar-bg {
      flex: 1;
      margin: 0 10px;
      background: #f0f2f5;
      border-radius: 6px;
      height: 10px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a69bd, #6a89dd);
      border-radius: 6px;
      transition: width 0.5s ease;
    }
    .result-row .votes {
      font-weight: 700;
      color: #4a69bd;
      font-size: 1rem;
      min-width: 35px;
      text-align: right;
    }
    .no-vote-row {
      color: #aaa;
      font-size: 0.85rem;
      padding: 0.3rem 0;
      text-align: right;
    }

    .chart-container {
      position: relative;
      width: 100%;
      margin-bottom: 1rem;
    }

    .refresh-btn {
      display: block;
      margin: 0 auto 1rem;
      padding: 0.5rem 1.5rem;
      background: #4a69bd;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .refresh-btn:hover { background: #3b5998; }
    .back-link {
      text-align: center;
      margin-top: 1rem;
    }
    .back-link a {
      color: #4a69bd;
      text-decoration: none;
      font-weight: 600;
    }
    .empty-msg { text-align: center; color: #888; padding: 2rem; }
    .locked-msg {
      text-align: center;
      padding: 3rem 1rem;
    }
    .locked-msg h2 { color: #888; margin-bottom: 0.5rem; }
    .locked-msg p { color: #aaa; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Lea Singers</h1>
    <p>Committee Vote Results</p>
  </div>
  <div class="container">
    <div style="display:flex; justify-content:center; align-items:center; gap:1rem; margin-bottom:1rem;">
      <button class="refresh-btn" onclick="loadResults()" style="margin:0;">Refresh Now</button>
      <span id="auto-refresh-label" style="font-size:0.8rem; color:#888;">Auto-refreshes every 10s</span>
    </div>
    <div id="content">
      <p class="empty-msg">Loading...</p>
    </div>
    <div class="back-link">
      <a href="/">← Back to Voting</a>
    </div>
  </div>

  <script>
    const COLORS = [
      "#4a69bd", "#e15f41", "#78e08f", "#f8c291",
      "#38ada9", "#fa983a", "#9b59b6", "#3498db",
      "#e55039", "#b8e994", "#6a89dd", "#1abc9c",
    ];
    let charts = {};

    async function loadResults() {
      try {
        const res = await fetch("/api/results");

        if (res.status === 403) {
          document.getElementById("content").innerHTML = `
            <div class="card locked-msg">
              <h2>Results Not Available Yet</h2>
              <p>The results will be published once voting is complete.</p>
            </div>`;
          return;
        }

        const data = await res.json();

        if (data.results.length === 0) {
          document.getElementById("content").innerHTML = '<p class="empty-msg">No results yet</p>';
          return;
        }

        let html = "";

        for (const r of data.results) {
          html += '<div class="position-section">';
          html += `<div class="card">`;

          // Position header
          html += `<div class="position-header-bar">`;
          html += `<span class="position-title">${escapeHtml(r.position.name)}</span>`;
          html += `<span class="voter-count">${r.totalVoters} voter${r.totalVoters !== 1 ? "s" : ""}</span>`;
          html += `</div>`;

          // Declared winners
          if (r.winners && r.winners.length > 0) {
            for (const w of r.winners) {
              html += `<div class="winner-banner">
                <div class="label">Elected</div>
                <div class="name">${escapeHtml(w.nominee_name)}</div>
              </div>`;
            }
          }

          if (r.nominees.length > 0) {
            // Chart
            const chartId = `chart-${r.position.id}`;
            html += `<div class="chart-container" style="height:${Math.max(120, r.nominees.length * 40)}px;">
              <canvas id="${chartId}"></canvas>
            </div>`;

            // Result rows
            const maxVotes = Math.max(...r.nominees.map((n) => n.votes), 1);
            r.nominees.forEach((n, i) => {
              const rankClass = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
              const pct = (n.votes / maxVotes) * 100;
              html += `<div class="result-row">
                <span class="rank ${rankClass}">${i + 1}</span>
                <span class="name">${escapeHtml(n.name)}</span>
                <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
                <span class="votes">${n.votes}</span>
              </div>`;
            });

            // No votes
            if (r.noVotes > 0) {
              html += `<div class="no-vote-row">"No vote": ${r.noVotes}</div>`;
            }
          } else {
            html += '<p class="empty-msg" style="padding:1rem;">No nominees for this position</p>';
          }

          html += `</div></div>`;
        }

        document.getElementById("content").innerHTML = html;

        // Render charts
        for (const r of data.results) {
          if (r.nominees.length === 0) continue;
          const chartId = `chart-${r.position.id}`;
          const ctx = document.getElementById(chartId);
          if (!ctx) continue;

          if (charts[chartId]) charts[chartId].destroy();

          charts[chartId] = new Chart(ctx.getContext("2d"), {
            type: "bar",
            data: {
              labels: r.nominees.map((n) => n.name),
              datasets: [{
                label: "Votes",
                data: r.nominees.map((n) => n.votes),
                backgroundColor: r.nominees.map((_, i) => COLORS[i % COLORS.length]),
                borderRadius: 6,
                maxBarThickness: 40,
              }],
            },
            options: {
              indexAxis: "y",
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: {
                  beginAtZero: true,
                  ticks: { stepSize: 1, precision: 0 },
                  grid: { display: false },
                },
                y: { grid: { display: false } },
              },
            },
          });
        }
      } catch (err) {
        document.getElementById("content").innerHTML =
          '<p class="empty-msg">Could not load results. Please try again.</p>';
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    loadResults();
    // Auto-refresh every 10 seconds so you can watch votes come in live
    setInterval(loadResults, 10000);
  </script>
</body>
</html>
