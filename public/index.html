<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lea Singers - Committee Vote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #2c3e7b, #4a69bd);
      color: white;
      text-align: center;
      padding: 2rem 1rem;
    }
    .header h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }
    .header p { opacity: 0.85; font-size: 0.95rem; }
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }
    .info-text {
      text-align: center;
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .max-votes-info {
      text-align: center;
      color: #4a69bd;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .nominee-item {
      display: flex;
      align-items: center;
      padding: 0.85rem 0.5rem;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .nominee-item:last-child { border-bottom: none; }
    .nominee-item:hover { background: #f7f8fc; }
    .nominee-item.selected { background: #e8edf8; }
    .nominee-item input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-right: 12px;
      accent-color: #4a69bd;
      cursor: pointer;
    }
    .nominee-item label {
      font-size: 1.05rem;
      cursor: pointer;
      flex: 1;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 1rem;
      background: #4a69bd;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #3b5998; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    .success-msg {
      text-align: center;
      padding: 2rem;
    }
    .success-msg h2 { color: #27ae60; margin-bottom: 0.5rem; }
    .success-msg p { color: #555; }
    .success-msg a {
      display: inline-block;
      margin-top: 1rem;
      color: #4a69bd;
      text-decoration: none;
      font-weight: 600;
    }
    .closed-msg {
      text-align: center;
      padding: 2rem;
      color: #888;
    }
    .closed-msg h2 { color: #e74c3c; margin-bottom: 0.5rem; }
    .error-banner {
      background: #fde8e8;
      color: #c0392b;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      text-align: center;
      display: none;
    }
    .selected-count {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.5rem;
    }
    .footer {
      text-align: center;
      padding: 1.5rem;
      color: #aaa;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Lea Singers</h1>
    <p>Committee Election Vote</p>
  </div>
  <div class="container">
    <div id="error-banner" class="error-banner"></div>
    <div id="content">
      <p style="text-align:center; color:#888; padding:2rem;">Loading...</p>
    </div>
  </div>
  <div class="footer">Your vote is anonymous</div>

  <script>
    let nominees = [];
    let maxVotes = 0;
    let selected = new Set();

    async function init() {
      try {
        const res = await fetch("/api/nominees");
        const data = await res.json();
        nominees = data.nominees;
        maxVotes = data.maxVotes;

        if (data.myVotes.length > 0) {
          showSuccess();
          return;
        }
        if (!data.votingOpen) {
          showClosed();
          return;
        }
        if (nominees.length === 0) {
          document.getElementById("content").innerHTML =
            '<div class="card closed-msg"><h2>No nominees yet</h2><p>The nominees have not been added yet. Please check back later.</p></div>';
          return;
        }
        renderVotingForm();
      } catch (err) {
        document.getElementById("content").innerHTML =
          '<div class="card closed-msg"><h2>Error</h2><p>Could not load voting data. Please try again.</p></div>';
      }
    }

    function renderVotingForm() {
      const content = document.getElementById("content");
      let html = '<p class="info-text">Select the nominees you\'d like to vote for:</p>';
      if (maxVotes > 0) {
        html += `<p class="max-votes-info">You may vote for up to ${maxVotes} nominee${maxVotes > 1 ? "s" : ""}</p>`;
      }
      html += '<div class="card">';
      for (const n of nominees) {
        html += `
          <div class="nominee-item" onclick="toggle(${n.id}, this)" id="item-${n.id}">
            <input type="checkbox" id="cb-${n.id}" onclick="event.stopPropagation(); toggle(${n.id}, this.parentElement)">
            <label for="cb-${n.id}" onclick="event.stopPropagation()">${escapeHtml(n.name)}</label>
          </div>`;
      }
      html += '</div>';
      html += '<p class="selected-count" id="selected-count">0 selected</p>';
      html += '<button class="btn" id="submit-btn" onclick="submitVote()" disabled>Cast My Vote</button>';
      content.innerHTML = html;
    }

    function toggle(id, el) {
      const cb = document.getElementById("cb-" + id);
      if (selected.has(id)) {
        selected.delete(id);
        cb.checked = false;
        el.classList.remove("selected");
      } else {
        if (maxVotes > 0 && selected.size >= maxVotes) {
          showError(`You can only vote for up to ${maxVotes} nominee${maxVotes > 1 ? "s" : ""}`);
          return;
        }
        selected.add(id);
        cb.checked = true;
        el.classList.add("selected");
      }
      document.getElementById("selected-count").textContent = selected.size + " selected";
      document.getElementById("submit-btn").disabled = selected.size === 0;
      hideError();
    }

    async function submitVote() {
      const btn = document.getElementById("submit-btn");
      btn.disabled = true;
      btn.textContent = "Submitting...";

      try {
        const res = await fetch("/api/vote", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nomineeIds: [...selected] }),
        });
        const data = await res.json();
        if (!res.ok) {
          showError(data.error);
          btn.disabled = false;
          btn.textContent = "Cast My Vote";
          return;
        }
        showSuccess();
      } catch (err) {
        showError("Something went wrong. Please try again.");
        btn.disabled = false;
        btn.textContent = "Cast My Vote";
      }
    }

    function showSuccess() {
      document.getElementById("content").innerHTML = `
        <div class="card success-msg">
          <h2>Thank you!</h2>
          <p>Your vote has been recorded.</p>
          <a href="/results">View Results &rarr;</a>
        </div>`;
    }

    function showClosed() {
      document.getElementById("content").innerHTML = `
        <div class="card closed-msg">
          <h2>Voting is closed</h2>
          <p>Voting is not currently open. Please check back later.</p>
          <a href="/results" style="color:#4a69bd; text-decoration:none; font-weight:600; display:inline-block; margin-top:1rem;">View Results &rarr;</a>
        </div>`;
    }

    function showError(msg) {
      const el = document.getElementById("error-banner");
      el.textContent = msg;
      el.style.display = "block";
    }

    function hideError() {
      document.getElementById("error-banner").style.display = "none";
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
